<!doctype html>
<html>
  <head>
    <link rel='stylesheet' href='terminal.css'>
    <link rel='stylesheet' href='vendor/codemirror/codemirror.css'>
  </head>
  <body>
    <button id=runCode>Run</button>
    <div id=mainContainer>
      <div id=editor class=flexbox-item></div>
      <div id=outputBox class=flexbox-item>
	<div id="output"></div>
	<input id="repl-input" autocomplete="off"></input>
      </div>
      <div id=graphics class=flexbox-item></div>
    </div>


    <script type="text/javascript">
      // initializing our worker
      const worker = new Worker("worker.js");

      worker.onmessage = (event) => {
	  const { type, text, result, message } = event.data;

	  switch (type) {
	  case "stdout":
	      output.textContent += text + "\n";
	      output.scrollTop = output.scrollHeight;
	      break;

	  case "stderr":
	      output.textContent += "ERROR: " + text + "\n";
	      output.scrollTop = output.scrollHeight;
	      break;

	  case "result":
	      output.textContent += "Result: " + result + "\n";
	      output.textContent += ">>> ";
	      output.scrollTop = output.scrollHeight;
	      break;

	  case "status":
	      console.log("Status:", message);
	      break;
	  }
      }
      
      async function setup() {
	  let output = document.getElementById("output");
	  output.textContent = ">>> ";

	  // how we run code with our webworker
	  async function runCode(code){
	      console.log("Starting to run code", code)
	      
	      worker.postMessage({
		  type: "run",
		  python: code
	      });
	  }

	  // terminal REPL stuff
	  const inputEl = document.getElementById("repl-input");

	  let history = [];
	  let historyIndex = -1;
	  let buffer = "";
	  
	  function printPrompt() {
	      document.getElementById("output").textContent += ">>> ";
	  }

	  
	  inputEl.addEventListener("keydown", async (e) => {
	      if (e.key === "Enter") {
		  const code = inputEl.value;
		  output.textContent += code + "\n";
		  
		  history.push(code);
		  historyIndex = history.length;
		  
		  inputEl.value = "";
		  await runCode(code);
		  
		  printPrompt();
		  output.scrollTop = output.scrollHeight;
	      }

	      if (e.key === "ArrowUp") {
		  if (historyIndex > 0) {
		      historyIndex--;
		      inputEl.value = history[historyIndex];
		  }
		  e.preventDefault();
	      }

	      if (e.key === "ArrowDown") {
		  if (historyIndex < history.length - 1) {
		      historyIndex++;
		      inputEl.value = history[historyIndex];
		  } else {
		      inputEl.value = "";
		  }
		  e.preventDefault();
	      }
	  });


	  // end terminal REPL stuff

	  // this is for running the code in the editor
	  async function runEditorCode() {
	      let code = editor.getValue();
	      await runCode(code);
	      printPrompt();
	  }

	  document.getElementById("runCode").addEventListener("click", runEditorCode);
      }

      setup();

      const container = document.getElementById("graphics")

      const observer = new MutationObserver(mutations => {
	  for (const m of mutations) {
	      for (const node of m.addedNodes) {
		  if (
		      node.nodeType === Node.ELEMENT_NODE &&
			  (node.querySelector?.("canvas, svg") ||
			   node.tagName === "CANVAS" ||
			   node.tagName === "SVG")
		  ) {
		      container.appendChild(node)
		  }
	      }
	  }
      })
      
      observer.observe(document.body, { childList: true })
    </script>
    <script src='vendor/codemirror/codemirror.js'></script>
    <script src='vendor/codemirror/mode/python/python.js'></script>
    <script>
      const editor = CodeMirror(
	  document.getElementById("editor"),
	  {
	      mode: 'python',
	      lineNumbers: true,
	      indentUnit: 2,
	      tabSize: 2,
	      indentWithTabs: false,
	      lineWrapping: false,
	  });
    </script>
	      
  </body>
</html>
