<!doctype html>
<html>
  <head>
    <link rel='stylesheet' href='project.css'>
    <link rel='stylesheet' href='vendor/codemirror/codemirror.css'>
    <link rel='stylesheet' href='vendor/codemirror/eclipse.css'>
    <link rel='stylesheet' href='vendor/codemirror/elegant.css'>
    <link rel='stylesheet' href='vendor/codemirror/ambiance.css'>
    <link rel='stylesheet' href='vendor/codemirror/blackboard.css'>
    <link rel='stylesheet' href='vendor/codemirror/cobalt.css'>
  </head>
  <body>
    <div id=header>
      <button id=runCode>Run</button>
      <button id=stopCode>Stop</button>
    </div>
    <div id=mainContainer>
      <div id=collapsedCode>
	<span class="rotate">Code</span>
      </div>
      <div id=code class=flexbox-item>
	<div id=codeBar>
	  <div>
	    <span id=codeLabel>Code</span>
	    <select id=cmTheme>
	      <option value='eclipse'>eclipse</option>
	      <option value='elegant'>elegant</option>
	      <option value='ambiance'>ambiance</option>
	      <option value='blackboard'>blackboard</option>
	      <option value='cobalt'>cobalt</option>
	    </select>
	  </div>
	  <img id=codeMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=editor class=flexbox-item></div>
      </div>

      <div id=collapsedTerminal>
	<span class="rotate">Terminal</span>
      </div>
      <div id=terminal class="flexbox-item terminal-light-theme">
	<div id=terminalBar>
	  <div>
	    <span id=terminalLabel>Terminal</span>
	    <select id=terminalTheme>
	      <option value='light'>light</option>
	      <option value='dark'>dark</option>
	    </select>
	  </div>
	  <img id=terminalMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=output><input id="repl-input" autocomplete="off"></input></div>
      </div>

      <div id=collapsedGraphics>
	<span class="rotate">Graphics</span>
      </div>
      <div id=graphicsContainer class=flexbox-item>
	<div id=graphicsBar>
	  <span id=graphicsLabel>Graphics</span>
	  <img id=graphicsMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=graphics></div>
      </div>
    </div>

    <script type="text/javascript">
      // code for initializing and adjusting the layout of the screen
      function collapseEl(toCollapse, toExpand, newDisplayVal) {
	  toCollapse.style.display = "none";
	  toExpand.style.display = newDisplayVal;
      }

      let collapsedCode = document.getElementById("collapsedCode");
      collapsedCode.style.display = 'none';
      let code = document.getElementById("code");
      collapsedCode.addEventListener("click", () => {
	  collapseEl(collapsedCode, code, 'block');
      })
      document.getElementById("codeMinimize").addEventListener("click", () => {
	  collapseEl(code, collapsedCode, 'flex');
      })

      let collapsedTerminal = document.getElementById("collapsedTerminal");
      collapsedTerminal.style.display = 'none';
      let terminal = document.getElementById("terminal");
      collapsedTerminal.addEventListener("click", () => {
	  collapseEl(collapsedTerminal, terminal, 'block');
      })
      document.getElementById("terminalMinimize").addEventListener("click", () => {
	  collapseEl(terminal, collapsedTerminal, 'flex');
      })

      let collapsedGrapics = document.getElementById("collapsedGraphics");
      let graphics = document.getElementById("graphicsContainer");
      graphics.style.display = 'none';
      collapsedGraphics.addEventListener("click", () => {
	  collapseEl(collapsedGraphics, graphics, 'block');
      })
      document.getElementById("graphicsMinimize").addEventListener("click", () => {
	  collapseEl(graphics, collapsedGraphics, 'flex');
      })
    </script>

    <script type="text/javascript">
      // initializing our worker
      const worker = new Worker("worker.js");
      const output = document.getElementById("output");
      let terminalStatus = 'ready';
      let ourInput = document.getElementById("repl-input");
      const interruptBuffer = new Int32Array(new SharedArrayBuffer(4));

      const terminalThemeOption = document.getElementById("terminalTheme");
      const terminalEl = document.getElementById("terminal");
      terminalThemeOption.addEventListener('change', () => {
	  console.log("Stuff");
	  if (terminalThemeOption.value == 'light') {
	      terminalEl.classList.add("terminal-light-theme");
	      terminalEl.classList.remove("terminal-dark-theme");
	  } else if (terminalThemeOption.value == 'dark') {
	      terminalEl.classList.add("terminal-dark-theme");
	      terminalEl.classList.remove("terminal-light-theme");
	  }
      })

      worker.postMessage({ type: "init_buffer",
			   interruptBuffer: interruptBuffer });
      worker.postMessage({ type: "init_graphics",
			   width: document.getElementById("graphics").clientWidth,
			   height: document.getElementById("graphics").clientHeight });

      output.addText = (content) => {
	  let wasFocused = ourInput.contains(document.activeElement);
	  let newDiv = document.createElement("div");
	  newDiv.className = 'line';

	  let newText = document.createElement("span");
	  newText.textContent = content;

	  newDiv.append(newText);
	  output.appendChild(newDiv);
	  newDiv.appendChild(ourInput);
	  document.getElementById("terminal").scrollTop = document.getElementById("terminal").scrollHeight;
	  if (wasFocused) {
	      ourInput.focus();
	  }
      }

      output.appendText = (content) => {
	  let wasFocused = ourInput.contains(document.activeElement);
	  let newText = document.createElement("span");
	  newText.textContent = content;

	  output.lastElementChild.insertBefore(newText, ourInput);
	  if (wasFocused) {
	      ourInput.focus();
	  }
      }

      // this just makes the appended text of class 'userInput' to allow recoloring (compared to appendText)
      output.appendInput = (content) => {
	  let wasFocused = ourInput.contains(document.activeElement);
	  let newText = document.createElement("span");
	  newText.className = 'userInput';
	  newText.textContent = content;

	  output.lastElementChild.insertBefore(newText, ourInput);
	  if (wasFocused) {
	      ourInput.focus();
	  }
      }
      
      output.addError = (content) => {
	  let wasFocused = ourInput.contains(document.activeElement);
	  let newDiv = document.createElement("div");
	  newDiv.className = 'line';
	  let newSpan = document.createElement("span");
	  newSpan.className = 'outputError';
	  newSpan.textContent = content;

	  newDiv.appendChild(newSpan);
	  newDiv.appendChild(ourInput);
	  output.appendChild(newDiv);
	  document.getElementById("terminal").scrollTop = document.getElementById("terminal").scrollHeight;
	  if (wasFocused) {
	      ourInput.focus();
	  }
      }
      
      output.printPrompt = () => {
	  output.addText(">>> ");
      }

      function sendInterrupt() {
	  Atomics.store(interruptBuffer, 0, 2); // 2 = SIGINT-like signal
	  Atomics.notify(interruptBuffer, 0);
      }
      
      // code to jam turtle graphics into the graphics box
      const elementFromProps = (map) => {
	  const tag = map.get("tag");
	  if (!tag) { return document.createTextNode(map.get("tag")); }
	  
	  const node = document.createElement(map.get("tag"));
	  
	  const pProps = map.get("props")
	  const props = pProps instanceof Map ? pProps : new Map(Object.entries(pProps))
      
	  for (const [key, value] of props) { node.setAttribute(key, value); }
	  for (let i = 0; i < map.get("children").length; i++) {
	      node.appendChild(elementFromProps(new Map(Object.entries(map.get("children")[i]))));
	  }
	  
	  return node;
      }
      
      worker.onmessage = function (event) {
	  const { type, message } = event.data;
	  
	  switch (type) {
	  case "stdout":
	      output.addText(message);
	      break;
	      
	  case "stderr":
	      // most errors will have a trace through 2 Pyodide files that won't be relevant to
	      //   the user so we jump to part of the error message that involves the user's code
	      console.log(message);
	      let userError = message.indexOf('File "<string>"');
	      let errorMessage = message
	      if (userError != -1) {
		  errorMessage = message.substring(userError);
	      }
	      output.addError(errorMessage);
	      break;
	      
	  case "result":
	      if (message) {
		  // result is often undefined as we do not use
		  //   the "return value" of executing python very often
		  //   if it is not present, we skip this and just display another prompt
		  output.addText(message);
	      }
	      console.log("Result: " + message);
	      break;
	      
	  case "status":
	      if (message === "done" || message === "error") {
		  output.printPrompt();
		  terminalStatus = 'ready';
	      }
	      console.log("Status:", message);
	      break;
	      
	  case "incomplete":
	      console.log("Incomplete line detected");
	      output.addText("... ");
	      terminalStatus = 'ready';
	      break;
	      
	  case "turtle_graphics":
	      console.log("Turtle graphics detected");
	      graphics.innerHTML = elementFromProps(new Map(Object.entries(message))).outerHTML;
	      break;
	      
	  case "stdin_request":
	      console.log("stdin_request detected")
	      output.addText(message);
	      terminalStatus = 'awaitingInput';
	      // force the focus on input (which will also make the cursor blink)
	      ourInput.focus();
	      break;
	  }
      }
      
      async function setup() {
	  let output = document.getElementById("output");
	  output.printPrompt();

	  // how we run code with our webworker
	  async function runEditorCode(code){
	      console.log("Starting to run editor code", code);

	      terminalStatus = 'busy';
	      
	      // send a message to reset the interactive console?
	      worker.postMessage({
		  type: "refresh",
		  python: undefined
	      });

	      console.log("Actually running");
	      
	      worker.postMessage({
		  type: "run",
		  python: code,
		  source: "editor"
	      });
	  }

	  async function runTerminalCode(code){
	      console.log("Starting to run terminal code", code)

	      terminalStatus = 'busy';

	      worker.postMessage({
		  type: "run",
		  python: code,
		  source: "terminal"
	      });
	  }

	  // terminal REPL stuff
	  const inputEl = document.getElementById("repl-input");

	  let history = [];
	  let historyIndex = -1;
	  let buffer = "";
	  
	  
	  inputEl.addEventListener("keydown", async (e) => {
	      if (e.key === "Enter") {
		  if (terminalStatus == 'ready') {
		      const code = inputEl.value;
		      output.appendText(code);
		      
		      history.push(code);
		      historyIndex = history.length;
		      
		      inputEl.value = "";
		      await runTerminalCode(code);
		  } else if (terminalStatus == 'awaitingInput') {
		      const response = inputEl.value;
		      output.appendInput(response);

		      inputEl.value = "";
		      worker.postMessage({type: "input-response", value: response});

		      terminalStatus = 'ready';
		  } else if (terminalStatus == 'awaitingIncomplete') {
		      // not actually using this, delete?
		  } else {
		      // pass, terminal status is busy. Think about what UI response should happen
		  }
	      }

	      if (e.key === "ArrowUp") {
		  if (historyIndex > 0) {
		      historyIndex--;
		      inputEl.value = history[historyIndex];
		  }
		  e.preventDefault();
	      }

	      if (e.key === "ArrowDown") {
		  if (historyIndex < history.length - 1) {
		      historyIndex++;
		      inputEl.value = history[historyIndex];
		  } else {
		      inputEl.value = "";
		  }
		  e.preventDefault();
	      }

	      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "c") {
		  e.preventDefault();
		  console.log("Saw Ctrl+C");
		  sendInterrupt();
	      }
	  });


	  // end terminal REPL stuff

	  // this is for running the code in the editor
	  async function gatherAndRunEditorCode() {
	      output.addError("Running file, refreshing environment");
	      let code = editor.getValue();
	      await runEditorCode(code);
	  }

	  document.getElementById("runCode").addEventListener("click", gatherAndRunEditorCode);
      }

      setup();

      // if python creates a graphics interface, move it to the graphics tab - this is for matplotlib
      const container = document.getElementById("graphics")
      const observer = new MutationObserver(mutations => {
	  for (const m of mutations) {
	      for (const node of m.addedNodes) {
		  if (
		      node.nodeType === Node.ELEMENT_NODE &&
			  (node.querySelector?.("canvas, svg") ||
			   node.tagName === "CANVAS" ||
			   node.tagName === "SVG")
		  ) {
		      container.appendChild(node)
		  }
	      }
	  }
      })
      
      observer.observe(document.body, { childList: true })
    </script>
    <script src='vendor/codemirror/codemirror.js'></script>
    <script src='vendor/codemirror/mode/python/python.js'></script>
    <script>
      const editor = CodeMirror(
	  document.getElementById("editor"),
	  {
	      mode: 'python',
	      lineNumbers: true,
	      indentUnit: 2,
	      tabSize: 2,
	      indentWithTabs: false,
	      lineWrapping: false,
	      theme: "eclipse"
	  });

      const cmThemeOption = document.getElementById("cmTheme");
      cmThemeOption.addEventListener('change', () => {
	  editor.setOption("theme", cmThemeOption.value);
      })
    </script>
	      
  </body>
</html>
