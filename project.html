
<!doctype html>
<html>
  <head>
    <link rel='stylesheet' href='project.css'>
    <link rel='stylesheet' href='vendor/codemirror/codemirror.css'>
    <link rel='stylesheet' href='vendor/codemirror/eclipse.css'>
    <link rel='stylesheet' href='vendor/codemirror/elegant.css'>
    <link rel='stylesheet' href='vendor/codemirror/ambiance.css'>
    <link rel='stylesheet' href='vendor/codemirror/blackboard.css'>
    <link rel='stylesheet' href='vendor/codemirror/cobalt.css'>
  </head>
  <body>
    <div id='dialogBackgrounds'></div>
    
    <div id=header>
      <div id=accountState>
	<button id=login popovertarget='login-dialog'>Login</button>
	<button id=createAccount popovertarget='signup-dialog'>Sign Up</button>
	<button id=accountProfile>Profile</button>
	<button id=signOut>Sign Out</button>
      </div>
      <div id=codeState>
	<button id=runCode>Run</button>
	<button id=stopCode>Stop</button>
      </div>
      <div id=saveState>
	<button id=save>Save</button>
      </div>
    </div>

    <dialog popover id='login-dialog'>
      <form id='login-form'>
	<input type='text' name='identifier' placeholder='Email/Username' autocomplete='username' required>
	<input type='password' name='password' placeholder='Password' required>
	<div class='dialogButtonDiv'>
	  <button type='submit'>Login</button>
	  <button type='button' popovertarget='login-dialog'>Cancel</button>
	</div>
      </form>
    </dialog>

    <dialog popover id='signup-dialog'>
      <form id='signup-form'>
	<input type='text' name='username' placeholder='Username' required>
	<input type='email' name='email' placeholder='Email' required>
	<input type='password' name='password' placeholder='Password' required>
	<div class='dialogButtonDiv'>
	  <button type='submit'>Signup</button>
	  <button type='button' popovertarget='signup-dialog'>Cancel</button>
	</div>
      </form>
    </dialog>

    <dialog popover id='project-naming-dialog'>
      <form id='project-naming-form'>
	<input type='text' name='project_name' placeholder='Project Name' required>
	<div class='dialogButtonDiv'>
	  <button type='submit'>Save</button>
	  <button type='button' popovertarget='project-naming-dialog'>Cancel</button>
	</div>
      </form>
    </dialog>
        
    <div id=mainContainer>
      <div id=collapsedCode>
	<span class="rotate">Code</span>
      </div>
      <div id=code class=flexbox-item>
	<div id=codeBar>
	  <div>
	    <span id=codeLabel>Code</span>
	    <select id=cmTheme>
	      <option value='eclipse'>eclipse</option>
	      <option value='elegant'>elegant</option>
	      <option value='ambiance'>ambiance</option>
	      <option value='blackboard'>blackboard</option>
	      <option value='cobalt'>cobalt</option>
	    </select>
	  </div>
	  <img id=codeMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=editor class=flexbox-item></div>
      </div>

      <div id=collapsedTerminal>
	<span class="rotate">Terminal</span>
      </div>
      <div id=terminal class="flexbox-item terminal-light-theme">
	<div id=terminalBar>
	  <div>
	    <span id=terminalLabel>Terminal</span>
	    <select id=terminalTheme>
	      <option value='light'>light</option>
	      <option value='dark'>dark</option>
	    </select>
	  </div>
	  <img id=terminalMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=output><input id="repl-input" autocomplete="off"></input></div>
      </div>

      <div id=collapsedGraphics>
	<span class="rotate">Graphics</span>
      </div>
      <div id=graphicsContainer class=flexbox-item>
	<div id=graphicsBar>
	  <span id=graphicsLabel>Graphics</span>
	  <img id=graphicsMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=graphics></div>
      </div>
    </div>


    <script src='vendor/codemirror/codemirror.js'></script>
    <script src='vendor/codemirror/mode/python/python.js'></script>

    <!-- this import of main calls the rest of the JS for this page -->
    <script type="module" src="./src/js/main.js">


    </script>
  </body>
</html>
