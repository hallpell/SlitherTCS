<!doctype html>
<html>
  <head>
    <link rel='stylesheet' href='project.css'>
    <link rel='stylesheet' href='vendor/codemirror/codemirror.css'>
    <link rel='stylesheet' href='vendor/codemirror/eclipse.css'>
    <link rel='stylesheet' href='vendor/codemirror/elegant.css'>
    <link rel='stylesheet' href='vendor/codemirror/ambiance.css'>
    <link rel='stylesheet' href='vendor/codemirror/blackboard.css'>
    <link rel='stylesheet' href='vendor/codemirror/cobalt.css'>
  </head>
  <body>
    <div id='dialogBackgrounds'></div>
    
    <div id=header>
      <div id=accountState>
	<button id=login popovertarget='login-dialog'>Login</button>
	<button id=createAccount popovertarget='signup-dialog'>Sign Up</button>
	<button popovertarget='profileDropdown' id=accountProfile style='anchor-name: --profile_button'>Profile</button>
	<div popover id='profileDropdown'>
	  <ul id='profileList'>
	    <li id='newProject'>
	      <span>New Project</span>
	    </li>
	    <li id='signOut'>
	      <span>Sign Out</span>
	    </li>
	  </ul>
	</div>
      </div>
      <div id=codeState>
	<button id=runCode>Run</button>
	<button id=stopCode>Stop</button>
      </div>
      <div id=saveState>
	<button id=save>Save</button>
      </div>
    </div>

    <dialog popover id='login-dialog' class='modal' popover='auto'>
      <form id='login-form'>
	<div id='login-header'>
	  <h3>Log In</h3>
	  <hr>
	</div>
	<div id='login-body'>
	  <div class='form-group'>
	    <span>Username/Email</span><br>
	    <input type='text' name='identifier' autocomplete='username' required>
	    <br><span id='login-form-username-validation' class='auth-validation'></span>
	  </div>
	  <div class='form-group'>
	    <span>Password</span><br>
	    <input type='password' name='password' required>
	    <br><span id='login-form-password-validation' class='auth-validation'></span>
	  </div>
	  <div class='form-group form-button-group'>
	    <button type='submit'>Login</button>
	    <button type='button' popovertarget='login-dialog'>Cancel</button>
	  </div>
	  <div class='form-group form-button-group'>
	    <a id='login-to-signup'>Don't have an account?</a>
	  </div>
	</div>
      </form>
    </dialog>

    <dialog popover id='signup-dialog' class='modal' popover='auto'>
      <form id='signup-form' novalidate>
	<div id='signup-header'>
	  <h3>Sign Up</h3>
	  <hr>
	</div>
	<div id='signup-body'>
	  <div class='form-group'>
	    <span>Username (don't use your real name [MAKE TOOLTIP])</span><br>
	    <input id='signup-form-username' type='text' name='username' autocomplete='username' required>
	    <br><span id='signup-form-username-validation' class='auth-validation'></span>
	  </div>
	  <div class='form-group'>
	    <span>Email</span><br>
	    <input id='signup-form-email' type='email' name='email' autocomplete='email' required>
	    <br><span id='signup-form-email-validation' class='auth-validation'></span>
	  </div>
	  <div class='form-group'>
	    <span>Password</span><br>
	    <input id='signup-form-password' type='password' name='password' required>
	    <br><span id='signup-form-password-validation' class='signup-validation'></span>
	  </div>
	  <div class='form-group form-button-group'>
	    <button type='submit'>Signup</button>
	    <button type='button' popovertarget='signup-dialog'>Cancel</button>
	  </div>
	  <div class='form-group form-button-group'>
	    <span id='signup-to-login'>Already have an account?</span>
	  </div>
	</div>
      </form>
    </dialog>

    <dialog popover id='project-naming-dialog' class='modal' popover='auto'>
      <form id='project-naming-form'>
	<input id='project-name-input' type='text' name='project_name' placeholder='Project Name' required>
	<div class='dialogButtonDiv'>
	  <button type='submit'>Save</button>
	  <button type='button' popovertarget='project-naming-dialog'>Cancel</button>
	</div>
      </form>
    </dialog>
        
    <div id=mainContainer>
      <div id=collapsedCode>
	<span class="rotate">Code</span>
      </div>
      <div id=code class=flexbox-item>
	<div id=codeBar>
	  <div>
	    <span id=codeLabel>Code</span>
	    <select id=cmTheme>
	      <option value='eclipse'>eclipse</option>
	      <option value='elegant'>elegant</option>
	      <option value='ambiance'>ambiance</option>
	      <option value='blackboard'>blackboard</option>
	      <option value='cobalt'>cobalt</option>
	    </select>
	  </div>
	  <img id=codeMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=editor class=flexbox-item></div>
      </div>

      <div id=collapsedTerminal>
	<span class="rotate">Terminal</span>
      </div>
      <div id=terminal class="flexbox-item terminal-light-theme">
	<div id=terminalBar>
	  <div>
	    <span id=terminalLabel>Terminal</span>
	    <select id=terminalTheme>
	      <option value='light'>light</option>
	      <option value='dark'>dark</option>
	    </select>
	  </div>
	  <img id=terminalMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=output><input id="repl-input" autocomplete="off"></input></div>
      </div>

      <div id=collapsedGraphics>
	<span class="rotate">Graphics</span>
      </div>
      <div id=graphicsContainer class=flexbox-item>
	<div id=graphicsBar>
	  <span id=graphicsLabel>Graphics</span>
	  <img id=graphicsMinimize src='./images/minimize.png' height=16 width=16 class='minimize'></img>
	</div>
	<div id=graphics></div>
      </div>
    </div>


    <script src='vendor/codemirror/codemirror.js'></script>
    <script src='vendor/codemirror/mode/python/python.js'></script>

    <!-- this import of main calls the rest of the JS for this page -->
    <script type="module" src="./src/js/main.js">


    </script>
  </body>
</html>
