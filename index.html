<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <link rel='stylesheet' href='mainStyle.css'>
    <link rel='stylesheet' href='vendor/codemirror/codemirror.css'>
  </head>
  <body>
    <button id=runCode onClick='runCode()'>Run</button>
    <div id=mainContainer>
      <div id=editor class=flexbox-item></div>
      <div id=output class=flexbox-item></div>
      <div id=graphics class=flexbox-item></div>
    </div>
    <script type="text/javascript">
      async function runCode(){
          let pyodide = await loadPyodide();
	  await pyodide.loadPackage('numpy')
	  await pyodide.loadPackage('scikit-learn')
	  await pyodide.loadPackage('matplotlib')
	  
	  let code = editor.getValue();

	  pyodide.setStdout({
	      batched: (text) => {
		  document.getElementById('output').innerHTML += text + "\n"
	      }
	  })
	  pyodide.setStderr({
	      batched: (text) => {
		  document.getElementById('output').innerHTML +=
		      "<span class=outputError>" + text + "</span>\n"
	      }
	  })
          console.log(pyodide.runPython(code));
      }

      const container = document.getElementById("graphics")

      const observer = new MutationObserver(mutations => {
	  for (const m of mutations) {
	      for (const node of m.addedNodes) {
		  if (
		      node.nodeType === Node.ELEMENT_NODE &&
			  (node.querySelector?.("canvas, svg") ||
			   node.tagName === "CANVAS" ||
			   node.tagName === "SVG")
		  ) {
		      container.appendChild(node)
		  }
	      }
	  }
      })
      
      observer.observe(document.body, { childList: true })
    </script>
    <script src='vendor/codemirror/codemirror.js'></script>
    <script src='vendor/codemirror/mode/python/python.js'></script>
    <script>
      const editor = CodeMirror(
	  document.getElementById("editor"),
	  {
	      mode: 'python',
	      lineNumbers: true,
	      indentUnit: 2,
	      tabSize: 2,
	      indentWithTabs: false,
	      lineWrapping: false,
	  });
    </script>
	      
  </body>
</html>
